// LS: localStorage 캐시 + Firebase 비동기 동기화
function LS(k,v){
  if(v===undefined){
    try{const d=localStorage.getItem('si_'+k);return d?JSON.parse(d):null}catch{return null}
  } else {
    try{localStorage.setItem('si_'+k,JSON.stringify(v))}catch{}
    if(window.__fb)window.__fb.set(k,v);
    return true;
  }
}
// Firebase → localStorage 동기화 (앱 로드 시 1회 + 실시간)
async function syncFromFirebase(){
  if(!window.__fb)return;
  const SYNC_KEYS=['baseInv','txns','map','hist','plan','mp','capacity','completedCards','carryLog','visitors','safetyDays','productOutbound','groupSpec','coilerMin','mpHistory','holidays'];
  try{
    const data=await window.__fb.get();
    SYNC_KEYS.forEach(k=>{
      if(data[k]!==undefined){
        try{localStorage.setItem('si_'+k, typeof data[k]==='string'?data[k]:JSON.stringify(data[k]))}catch{}
      }
    });
  }catch(e){console.warn('FB sync error',e)}
}

function getMpQty(mp,code,date){const v=(mp[code]||{})[date];return typeof v==='object'?v.qty||0:v||0;}
function getMpCarried(mp,code,date){const v=(mp[code]||{})[date];return typeof v==='object'&&!!v.carried;}
function setMpVal(newMp,code,date,qty,carried){
  if(!newMp[code])newMp[code]={};
  if(qty<=0){delete newMp[code][date];}
  else if(carried){newMp[code][date]={qty,carried:true};}
  else{newMp[code][date]=qty;}
}
function getMpCodeTotal(mp,code){return Object.values(mp[code]||{}).reduce((a,v)=>a+(typeof v==='object'?v.qty||0:v||0),0);}

function detectFile(h,raw){
  const s=h.map(x=>String(x||''));
  if(s.includes('생산일')&&s.includes('제품코드')&&s.includes('미포장량'))return 'pkg';
  if(s.includes('투입일')&&s.includes('설비명'))return 'proc';
  if(s.includes('생산일')&&s.includes('제품코드')&&s.includes('생산량'))return 'pkg';
  if(s.includes('제품코드')&&s.includes('제품명')&&s.includes('합계'))return 'weekplan';
  if(s.includes('품목코드')&&s.includes('포장계획일')&&s.includes('계획량'))return 'pkgplan';
  // ERP 자재소요현황: 헤더에 품목코드+색상+3개월(평균매출) 키워드. '3개월'은 '3개월\n평균매출' 형태라 includes로 판단
  if(s.some(x=>x.includes('품목코드'))&&s.some(x=>x.includes('색상'))&&s.some(x=>x.includes('3개월')))return 'erp';
  return null;
}

function excelDateToISO(v){
  if(!v)return null;
  if(typeof v==='object'&&v.getFullYear&&v.getFullYear()>2020){const m=v.getMonth()+1,d=v.getDate();return `${v.getFullYear()}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
  if(typeof v==='number'&&v>44000&&v<55000){const d=new Date((v-25569)*86400000);if(d.getFullYear()>2020){const m=d.getMonth()+1,dd=d.getDate();return `${d.getFullYear()}-${String(m).padStart(2,'0')}-${String(dd).padStart(2,'0')}`}}
  const s=String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(s)&&parseInt(s.slice(0,4))>2020)return s.slice(0,10);
  if(/^\d{4}\/\d{2}\/\d{2}/.test(s)&&parseInt(s.slice(0,4))>2020)return s.slice(0,10).replace(/\//g,'-');
  const dp=Date.parse(s);if(!isNaN(dp)){const d=new Date(dp);if(d.getFullYear()>2020&&d.getFullYear()<2100){const m=d.getMonth()+1,dd=d.getDate();return `${d.getFullYear()}-${String(m).padStart(2,'0')}-${String(dd).padStart(2,'0')}`}}
  return null;
}

function DropZone({onFile}){
  const[dragging,setDragging]=useState(false);
  return <div
    className={`border-2 border-dashed rounded-lg p-6 text-center cursor-pointer transition-colors ${dragging?'border-blue-400 bg-blue-50':'border-gray-300 hover:border-blue-300 hover:bg-blue-50/50'}`}
    onClick={()=>{const i=document.createElement('input');i.type='file';i.accept='.xls,.xlsx';i.onchange=e=>onFile(e.target.files[0]);i.click()}}
    onDragOver={e=>{e.preventDefault();setDragging(true)}}
    onDragLeave={()=>setDragging(false)}
    onDrop={e=>{e.preventDefault();setDragging(false);const f=e.dataTransfer.files[0];if(f)onFile(f);}}>
    <p className="text-xs text-gray-500">{dragging?'파일을 놓으세요':'클릭하거나 파일을 여기에 끌어다 놓으세요'}</p>
    <p className="text-xs text-gray-400 mt-1">포장실적 / 가공실적 / 생산계획 자동 인식</p>
  </div>;
}

function WeeklyChart({plan}){
  const canvasRef=React.useRef(null);
  React.useEffect(()=>{
    const el=canvasRef.current;
    if(!el||!window.Chart)return;
    const weekMap={};
    Object.entries(plan).forEach(([sc,items])=>{
      items.forEach(({date,qty})=>{
        const d=new Date(date);
        const mon=new Date(d);mon.setDate(d.getDate()-(d.getDay()||7)+1);
        const wk=mon.toISOString().slice(0,10);
        weekMap[wk]=(weekMap[wk]||0)+qty;
      });
    });
    const weeks=Object.keys(weekMap).sort();
    if(weeks.length===0)return;
    if(el._ci){el._ci.destroy();delete el._ci;}
    el._ci=new Chart(el,{type:'line',data:{
      labels:weeks.map(w=>{const d=new Date(w);return (d.getMonth()+1)+'/'+(d.getDate());}),
      datasets:[{data:weeks.map(w=>weekMap[w]),borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.08)',borderWidth:2,pointRadius:4,pointBackgroundColor:'#3b82f6',fill:true,tension:0.3}]
    },options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y.toLocaleString()+'개'}}},scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{beginAtZero:true,grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},callback:v=>v.toLocaleString()+'개'}}}}});
    return()=>{if(el._ci){el._ci.destroy();delete el._ci;}};
  },[plan]);
  const hasData=Object.values(plan).some(items=>items.length>0);
  if(!hasData)return <div className="text-xs text-gray-400 text-center py-6">출고예정 데이터 없음</div>;
  return <canvas ref={canvasRef} height="140"/>;
}

function Dash({inv,map,hist,onUp,isA,plan,mp,sd,codes,groups,completedCards,carryLog}){
  const[expandedGroup,setExpandedGroup]=useState(null);
  const[flt,setFlt]=useState('전체');
  const[sort,setSort]=useState({col:null,asc:true});
  const[shortOnly,setShortOnly]=useState(false);
  const tot=Object.values(inv).reduce((a,b)=>a+b,0);
  const warn=codes.filter(c=>{const q=inv[c]||0,o=(plan[c]||[]).reduce((a,b)=>a+b.qty,0),i=getMpCodeTotal(mp,c);return q+i-o<=0}).length;
  // 어제 날짜 기준 생산완료 집계
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  const yd=`${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
  const ydDay=['일','월','화','수','목','금','토'][yesterday.getDay()];
  const ydFmt=`${yesterday.getMonth()+1}/${yesterday.getDate()}(${ydDay})`;
  // key: {code}_{YYYY-MM-DD}_{line} → 마지막 _로 line, 그 앞 10자로 date
  const ydProduced={A:{},B:{}}; // {line: {springCode: qty}}
  Object.entries(completedCards||{}).forEach(([k,v])=>{
    if(!v)return;
    const line=k.slice(-1); // 'A' or 'B'
    if(line!=='A'&&line!=='B')return;
    const date=k.slice(-12,-2); // YYYY-MM-DD
    if(date!==yd)return;
    const code=k.slice(0,-13); // springCode
    const qty=typeof v==='object'?v.qty||0:0;
    if(!ydProduced[line][code])ydProduced[line][code]=0;
    ydProduced[line][code]+=qty;
  });
  const ydQty={A:Object.values(ydProduced.A).reduce((a,b)=>a+b,0),B:Object.values(ydProduced.B).reduce((a,b)=>a+b,0)};
  const ydTotal=ydQty.A+ydQty.B;
  // 어제 날짜 기준 이월량 집계 (fromDate가 어제인 것)
  const ydCarry={A:0,B:0};
  (carryLog||[]).filter(l=>l.fromDate===yd).forEach(l=>{
    if(l.line==='A')ydCarry.A+=l.qty;
    else if(l.line==='B')ydCarry.B+=l.qty;
  });
  const flBase=flt==='전체'?codes:codes.filter(c=>sd[c].g===flt);
  const getVals=c=>{const q=inv[c]||0,o=(plan[c]||[]).reduce((a,b)=>a+b.qty,0),i=getMpCodeTotal(mp,c);return{q,o,i,av:q+i-o}};
  const flFiltered=shortOnly?flBase.filter(c=>getVals(c).av<=0):flBase;
  const fl=sort.col?[...flFiltered].sort((a,b)=>{const va=getVals(a),vb=getVals(b);const diff=sort.col==='q'?va.q-vb.q:va.av-vb.av;return sort.asc?diff:-diff}):flFiltered;
  const toggleSort=col=>setSort(s=>{if(s.col===col){if(s.asc)return{col,asc:false};return{col:null,asc:true}}return{col,asc:true}});
  const SH=({c,children})=><th onClick={()=>toggleSort(c)} className="text-right px-3 py-2 font-medium text-gray-500 w-20 whitespace-nowrap cursor-pointer hover:text-gray-700 select-none">{children}{sort.col===c?<span className="ml-0.5 text-blue-500">{sort.asc?'↑':'↓'}</span>:<span className="ml-0.5 text-gray-300">⇅</span>}</th>;
  return(<div>
    <div className="grid grid-cols-4 gap-3 mb-3">
      <MC l="총 스프링 품목" v="37" u="종" s="10개 그룹"/>
      <MC l="총 현재고" v={tot.toLocaleString()} u="개"/>
      <MC l="재고 부족 경고" v={warn} u="건" w={warn>0} s="가용재고 0 이하"/>
      <MC l="매핑 등록" v={Object.keys(map).length} u="건"/>
    </div>

      <div className="flex items-center justify-between mb-3">
        <h3 className="text-sm font-medium">{ydFmt} 생산 현황</h3>

      </div>
      <div className="grid grid-cols-2 gap-4">
        {[{line:'B',label:'1라인 (기타)',borderC:'#f97316',bg:'#fff7ed',tc:'#c2410c',mc:'#fb923c',qty:ydQty.B,carry:ydCarry.B,prod:ydProduced.B},
          {line:'A',label:'2라인 (일룸/이브닝/키즈)',borderC:'#3b82f6',bg:'#eff6ff',tc:'#1d4ed8',mc:'#60a5fa',qty:ydQty.A,carry:ydCarry.A,prod:ydProduced.A}
        ].map(({line,label,borderC,bg,tc,mc,qty,carry,prod})=>
          <div key={line} style={{background:bg,borderRadius:12,padding:'16px 20px',border:`1.5px solid ${borderC}22`,animation:'fadeSlideUp 0.4s ease',position:'relative',overflow:'hidden'}}>

              <span style={{fontSize:32,fontWeight:700,color:tc,lineHeight:1}}>{qty.toLocaleString()}</span>

          }).filter(x=>x.shortDate).sort((a,b)=>a.av-b.av).slice(0,6);
          if(critical.length===0)return <div className="flex items-center justify-center h-full text-xs text-gray-400 py-8">2주 내 부족 품목 없음</div>;
          return <div className="space-y-2">{critical.map(({c,av,shortDate})=>
            <div key={c} className="flex items-center gap-2 px-3 py-2 bg-red-50 rounded-lg border border-red-100">

              <div className="flex-1 min-w-0">
                <div className="text-xs font-medium text-gray-800 truncate">{sd[c].n}</div>

    </div>
    <div className="border border-gray-200 rounded-lg overflow-auto mb-5" style={{maxHeight:400}}>
      <table className="w-full text-xs">
        <thead className="sticky top-0"><tr className="bg-gray-50 border-b border-gray-200">
          <th className="text-left px-3 py-2 font-medium text-gray-500">반제품명</th>
          <th className="text-left px-2 py-2 font-medium text-gray-500 w-20">그룹</th>
          <SH c="q">현재고</SH>

          <th className="text-right px-3 py-2 font-medium text-gray-500 w-20 whitespace-nowrap">입고예정</th>

          <th className="px-3 py-2 w-20">상태</th>
        </tr></thead>
        <tbody>{fl.map(c=>{
          const{q,o,i,av}=getVals(c);
          return <tr key={c} className="border-b border-gray-100 hover:bg-gray-50">
            <td className="px-3 py-2 font-medium">{sd[c].n}</td>
            <td className="px-2 py-2"><Tag g={sd[c].g}/></td>
            <td className="text-right px-3 py-2">{q}</td>
            <td className="text-right px-3 py-2 text-gray-400">{o||0}</td>
            <td className="text-right px-3 py-2 text-blue-600">{i||0}</td>
            <td className={`text-right px-3 py-2 font-medium ${av<0?'text-red-500':av<=50?'text-amber-500':'text-emerald-600'}`}>{av}</td>
            <td className="px-3 py-2"><div className="h-1.5 rounded-full" style={{width:`${Math.min(Math.max((av/200)*100,5),100)}%`,background:av<0?'#ef4444':av<=50?'#f59e0b':'#10b981'}}/></td>
          </tr>
        })}
        {(()=>{const tq=fl.reduce((a,c)=>a+(inv[c]||0),0),to=fl.reduce((a,c)=>a+(plan[c]||[]).reduce((s,b)=>s+b.qty,0),0),ti=fl.reduce((a,c)=>a+getMpCodeTotal(mp,c),0),ta=tq+ti-to;return <tr className="bg-gray-100 border-t-2 border-gray-300 sticky bottom-0">
          <td className="px-3 py-2 font-bold text-gray-700" colSpan={2}>합계 ({fl.length}종)</td>
          <td className="text-right px-3 py-2 font-bold">{tq.toLocaleString()}</td>
          <td className="text-right px-3 py-2 font-bold text-gray-500">{to.toLocaleString()}</td>
          <td className="text-right px-3 py-2 font-bold text-blue-600">{ti.toLocaleString()}</td>
          <td className={`text-right px-3 py-2 font-bold ${ta<0?'text-red-500':'text-emerald-600'}`}>{ta.toLocaleString()}</td>
          <td></td>
        </tr>})()}
        </tbody>
      </table>
    </div>

  </div>);
}

function MC({l,v,u,s,w}){
  return <div className="bg-gray-50 rounded-lg p-3.5 border border-gray-200">
    <div className="text-xs text-gray-500 mb-1">{l}</div>
    <div className={`text-xl font-medium ${w?'text-red-500':''}`}>{v}<span className="text-xs text-gray-400 font-normal ml-0.5">{u}</span></div>
    {s&&<div className="text-xs text-gray-400 mt-0.5">{s}</div>}
  </div>
}

function Plan({inv,plan,mp,setMp,isA,capacity,setCapacity,sd,codes,groups,completedCards,toggleComplete,carryLog,setCarryLog,groupSpec,setGroupSpec,safetyDays,setSafetyDays,productOutbound,springMonthlyAvg,coilerMin,setCoilerMin,goToTab,mpHistory,pushMpSnapshot,holidays,setHolidays}){
  const[gf,setGf]=useState('전체');
  const[shortOnly,setShortOnly]=useState(false);
  const[expanded,setExpanded]=useState(false);
  const[startDate,setStartDate]=useState(()=>{const t=new Date();return t.toISOString().slice(0,10)});
  const[endDate,setEndDate]=useState(()=>{const t=new Date();t.setDate(t.getDate()+13);return t.toISOString().slice(0,10)});
  const[capWarn,setCapWarn]=useState(null);
  const[apsGate,setApsGate]=useState(null); // {missing}
  const[apsModal,setApsModal]=useState(null); // {open:true,scenarios,...}
  const[ganttHover,setGanttHover]=useState(null); // 셀 hover 시 항목별 상세 툴팁 {label,line,date,items,x,y}
  const[apsEditor,setApsEditor]=useState(null); // {dates,shortages,scenarioName,originalMetrics,stagedSchedule}
  const[mpHistoryOpen,setMpHistoryOpen]=useState(false);
  const[holidaysOpen,setHolidaysOpen]=useState(false);
  const[newHolidayDate,setNewHolidayDate]=useState(()=>new Date().toISOString().slice(0,10));
  const[newHolidayMemo,setNewHolidayMemo]=useState('');
  // 모달 열 때 오늘 날짜로 초기화 (이전 입력 잔여값 또는 빈 값으로 인한 기본 연도 이슈 방지)
  useEffect(()=>{if(holidaysOpen)setNewHolidayDate(new Date().toISOString().slice(0,10))},[holidaysOpen]);
  const addHoliday=()=>{
    if(!newHolidayDate)return;
    if((holidays||[]).some(h=>h.date===newHolidayDate)){alert('이미 등록된 날짜입니다.');return}
    const next=[...(holidays||[]),{date:newHolidayDate,memo:newHolidayMemo||''}].sort((a,b)=>a.date.localeCompare(b.date));
    if(setHolidays)setHolidays(next);
    setNewHolidayDate(new Date().toISOString().slice(0,10));setNewHolidayMemo('');
  };
  const removeHoliday=(date)=>{
    const next=(holidays||[]).filter(h=>h.date!==date);
    if(setHolidays)setHolidays(next);
  };
  const restoreSnapshot=(snap)=>{
    if(!snap)return;
    const ts=new Date(snap.ts).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    if(!confirm(`${ts} 시점으로 복원하시겠습니까?\n\n· 라벨: ${snap.label}\n\n현재 mp/lineOverride 상태는 자동으로 스냅샷에 저장되어 다시 되돌릴 수 있습니다.`))return;
    if(pushMpSnapshot)pushMpSnapshot(`복원 직전 상태 (→ ${ts})`,'restore');
    setMp(snap.mp||{});LS('mp',snap.mp||{});
    setLineOverride(snap.lineOverride||{});LS('lineOverride',snap.lineOverride||{});
    setMpHistoryOpen(false);
    alert('복원 완료');
  };
  const createManualSnapshot=()=>{
    const label=prompt('이 시점에 대한 라벨을 입력하세요:','수동 저장 - '+new Date().toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}));
    if(!label)return;
    if(pushMpSnapshot)pushMpSnapshot(label,'manual');
    alert('스냅샷 저장됨');
  };
  const editorMetrics=useMemo(()=>{
    if(!apsEditor)return null;
    const left=recomputeShortagesLeft(apsEditor.stagedSchedule,apsEditor.shortages,apsEditor.dates);
    const m=computeScenarioMetrics({schedule:apsEditor.stagedSchedule,shortagesLeft:left},apsEditor.shortages);
    const exceed=countCapacityExceedDays(apsEditor.stagedSchedule,apsEditor.dates,capacity);
    return{...m,exceed};
  },[apsEditor,capacity]);
  const updateStagedItem=(line,date,idx,patch)=>{
    if(!apsEditor)return;
    const next=JSON.parse(JSON.stringify(apsEditor.stagedSchedule));
    if(patch===null){
      next[line][date].items.splice(idx,1);
    }else if(patch.line&&patch.line!==line){
      const it=next[line][date].items.splice(idx,1)[0];
      next[patch.line][date].items.push(it);
    }else if(typeof patch.qty==='number'){
      if(patch.qty<=0)next[line][date].items.splice(idx,1);
      else next[line][date].items[idx].qty=patch.qty;
    }
    setApsEditor({...apsEditor,stagedSchedule:next});
  };
  const commitEditor=()=>{
    if(!apsEditor)return;
    // 적용 직전 스냅샷
    if(pushMpSnapshot)pushMpSnapshot(`자동 계획 - ${apsEditor.scenarioName} 적용 직전`,'aps');
    const dts=apsEditor.dates;
    const newMp=scheduleToMp(apsEditor.stagedSchedule,dts);
    const merged={};
    Object.entries(mp).forEach(([c,dmap])=>{
      const kept={};
      Object.entries(dmap||{}).forEach(([d,v])=>{if(!dts.includes(d))kept[d]=v});
      if(Object.keys(kept).length>0)merged[c]=kept;
    });
    Object.entries(newMp).forEach(([c,dmap])=>{
      if(!merged[c])merged[c]={};
      Object.entries(dmap).forEach(([d,q])=>{merged[c][d]=q});
    });
    setMp(merged);LS('mp',merged);
    const newOv=scheduleToLineOverride(apsEditor.stagedSchedule,dts);
    const mergedOv={};
    Object.entries(lineOverride).forEach(([k,v])=>{
      const d=k.length>=10?k.slice(-10):'';
      if(!dts.includes(d))mergedOv[k]=v;
    });
    Object.entries(newOv).forEach(([k,v])=>{mergedOv[k]=v});
    setLineOverride(mergedOv);LS('lineOverride',mergedOv);
    const m=editorMetrics||apsEditor.originalMetrics;
    setApsEditor(null);
    alert(`'${apsEditor.scenarioName}' 적용 완료\n· 교체 ${m.changeoverCount}회 (${m.changeoverMin}분)\n· 총 생산 ${m.totalProduced}개\n· 납기준수 ${(m.onTimeRate*100).toFixed(0)}%${m.totalShort>0?` (남은 부족 ${m.totalShort}개)`:''}`);
  };

  const EQUIP_A=['일룸 1조닝','이브닝','일룸 키즈'];
  const getEquip=c=>EQUIP_A.includes(sd[c].g)?'A':'B';
  // lineOverride: {code_date: 'A'|'B'|'AB'} — 드래그앤드롭으로 기본 배정 덮어쓰기
  const[lineOverride,setLineOverride]=useState(()=>LS('lineOverride')||{});
  const[splitPopup,setSplitPopup]=useState(null); // {code,date,qty,toLine}
  const[carryPopup,setCarryPopup]=useState(null); // {code,fromDate,toDate,qty,line}
  const[dragItem,setDragItem]=useState(null); // {code,date,qty,fromLine}
  const getLine=(c,d)=>{const ov=lineOverride[c+'_'+d];return ov?(typeof ov==='object'?ov.line:ov):getEquip(c);};
  const setLine=(c,d,line)=>{const k=c+'_'+d;const n={...lineOverride,[k]:line};setLineOverride(n);LS('lineOverride',n);};

  const dates=useMemo(()=>{
    const result=[];
    let cur=new Date(startDate);
    const end=new Date(endDate);
    while(cur<=end){result.push(cur.toISOString().slice(0,10));cur.setDate(cur.getDate()+1)}
    return result;
  },[startDate,endDate]);

  const holidaySet=useMemo(()=>new Set((holidays||[]).map(h=>h.date)),[holidays]);
  const getHolidayMemo=(d)=>{const h=(holidays||[]).find(x=>x.date===d);return h?h.memo:''};

  const flBase=gf==='전체'?codes:codes.filter(c=>sd[c].g===gf);
  const fl=shortOnly?flBase.filter(c=>{
    let run=inv[c]||0;
    for(const d of dates){const out=(plan[c]||[]).filter(p=>p.date===d).reduce((a,b)=>a+b.qty,0);const inp=getMpQty(mp,c,d);run=run+inp-out;if(run<=0)return true}
    return false;
  }):flBase;
  const fmt=d=>{const dt=new Date(d);const dd=['일','월','화','수','목','금','토'];return `${dt.getMonth()+1}/${dt.getDate()}(${dd[dt.getDay()]})`};

  // Equipment schedule computation
  const equipSchedule=useMemo(()=>{
    const schedA={},schedB={};
    dates.forEach(d=>{
      const dayA=[],dayB=[];
      codes.forEach(c=>{
        const qty=getMpQty(mp,c,d);
        if(qty>0){
          const line=getLine(c,d);
          const sizeKey=getSizeKey(sd[c].n);
          const baseItem={code:c,group:sd[c].g,name:sd[c].n,size:sizeKey};
          if(line==='AB'){
            // 분할: lineOverride에 qtyA/qtyB 저장돼 있으면 그걸 쓰고, 없으면 반반
            const ov=lineOverride[c+'_'+d];
            const qA=(ov&&typeof ov==='object')?ov.qtyA:Math.ceil(qty/2);
            const qB=(ov&&typeof ov==='object')?ov.qtyB:Math.floor(qty/2);
            if(qA>0)dayA.push({...baseItem,qty:qA});
            if(qB>0)dayB.push({...baseItem,qty:qB});
          } else if(line==='A'){
            dayA.push({...baseItem,qty});
          } else {
            dayB.push({...baseItem,qty});
          }
        }
      });
      schedA[d]=dayA;schedB[d]=dayB;
    });
    // Count changeovers (changeoverTime 기반 — 강선/높이/부직포 + 코일러 안정화 합산)
    let coA=0,coB=0,coAm=0,coBm=0;
    let prevGA=null,prevGB=null;
    dates.forEach(d=>{
      schedA[d].forEach(item=>{
        if(prevGA&&prevGA!==item.group){
          const t=changeoverTime(prevGA,item.group,groupSpec,coilerMin);
          if(t>0){coA++;coAm+=t}
        }
        prevGA=item.group;
      });
      schedB[d].forEach(item=>{
        if(prevGB&&prevGB!==item.group){
          const t=changeoverTime(prevGB,item.group,groupSpec,coilerMin);
          if(t>0){coB++;coBm+=t}
        }
        prevGB=item.group;
      });
    });
    return{A:schedA,B:schedB,coA,coB,coAm,coBm};
  },[mp,dates,lineOverride,groupSpec,coilerMin]);

  const hasSchedule=dates.some(d=>(equipSchedule.A[d]||[]).length>0||(equipSchedule.B[d]||[]).length>0);

  const autoPlan=()=>{
    // 1. 부족 검사 데이터 — 월평균(productOutbound) 또는 plan 중 하나는 있어야 함
    const hasOutbound=Object.keys(productOutbound||{}).length>0;
    const hasPlan=Object.keys(plan||{}).length>0;
    if(!hasOutbound&&!hasPlan){
      if(confirm('자동 계획에 다음 중 하나는 필요합니다:\n· ERP 자재소요현황 (월평균 출고량)\n· 주간 생산계획 / 포장 계획 (출고예정)\n\n업로드 이력 탭으로 이동하시겠습니까?')){
        if(goToTab)goToTab('history');
      }
      return;
    }
    // 2. 그룹 스펙 검사 (강선/높이/부직포 미입력 그룹)
    const missing=getMissingSpecGroups(groupSpec);
    if(missing.length>0){setApsGate({missing});return}
    // 3. 시뮬 실행
    runScenarioSim();
  };
  // 모달이 열려있을 때 안전재고·capacity·코일러·휴일 변경 시 자동 재시뮬
  useEffect(()=>{
    if(!apsModal)return;
    const dts=apsModal.dates;
    const sh=extractShortages(inv,plan,codes,sd,dts,safetyDays,springMonthlyAvg);
    const r1=runDueDateFirst(sh,dts,capacity,groupSpec,coilerMin,holidays);
    const r2=runChangeoverMin(sh,dts,capacity,groupSpec,coilerMin,holidays);
    const alpha=apsModal.alpha;
    const r3=runBalanced(sh,dts,capacity,groupSpec,alpha,coilerMin,holidays);
    setApsModal(prev=>prev?{
      ...prev,
      shortages:sh,
      scenarios:[
        {id:'due',name:'납기 우선',desc:'납기 임박순으로 부족분만 즉시 생산. 교체 비용 무시.',result:r1,metrics:computeScenarioMetrics(r1,sh)},
        {id:'co',name:'교체 최소',desc:'같은 그룹을 묶어 한 번에 생산. 미리 적재로 교체 횟수 최소화.',result:r2,metrics:computeScenarioMetrics(r2,sh)},
        {id:'mid',name:'중간 (α='+alpha.toFixed(1)+')',desc:'납기 vs 교체 가중 평균. 슬라이더로 균형 조절.',result:r3,metrics:computeScenarioMetrics(r3,sh)},
      ]
    }:null);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  },[safetyDays,coilerMin,capacity&&capacity.A,capacity&&capacity.B,(holidays||[]).length]);
  const runScenarioSim=(opts)=>{
    const sd2=opts&&opts.startDate||startDate;
    const ed2=opts&&opts.endDate||endDate;
    const dts=buildDateRange(sd2,ed2);
    const sh=extractShortages(inv,plan,codes,sd,dts,safetyDays,springMonthlyAvg);
    if(sh.length===0){alert(`기간 내 부족 품목이 없습니다.\n(안전재고 ${safetyDays}일 기준)`);return}
    const r1=runDueDateFirst(sh,dts,capacity,groupSpec,coilerMin,holidays);
    const r2=runChangeoverMin(sh,dts,capacity,groupSpec,coilerMin,holidays);
    const alpha=opts&&typeof opts.alpha==='number'?opts.alpha:0.5;
    const r3=runBalanced(sh,dts,capacity,groupSpec,alpha,coilerMin,holidays);
    setApsModal({
      dates:dts,shortages:sh,alpha,
      scenarios:[
        {id:'due',name:'납기 우선',desc:'납기 임박순으로 부족분만 즉시 생산. 교체 비용 무시.',result:r1,metrics:computeScenarioMetrics(r1,sh)},
        {id:'co',name:'교체 최소',desc:'같은 그룹을 묶어 한 번에 생산. 미리 적재로 교체 횟수 최소화.',result:r2,metrics:computeScenarioMetrics(r2,sh)},
        {id:'mid',name:'중간 (α='+alpha.toFixed(1)+')',desc:'납기 vs 교체 가중 평균. 슬라이더로 균형 조절.',result:r3,metrics:computeScenarioMetrics(r3,sh)},
      ]
    });
  };
  const applyScenarioToMp=(scenario)=>{
    if(!apsModal||!scenario)return;
    const dts=apsModal.dates;
    const newSeg=scheduleToMp(scenario.result.schedule,dts);
    // 시작일~종료일 범위만 덮어쓰기, 그 외 mp는 보존
    const merged={};
    Object.entries(mp).forEach(([c,dmap])=>{
      const kept={};
      Object.entries(dmap||{}).forEach(([d,v])=>{
        if(!dts.includes(d))kept[d]=v;
      });
      if(Object.keys(kept).length>0)merged[c]=kept;
    });
    Object.entries(newSeg).forEach(([c,dmap])=>{
      if(!merged[c])merged[c]={};
      Object.entries(dmap).forEach(([d,q])=>{merged[c][d]=q});
    });
    setMp(merged);LS('mp',merged);
    // lineOverride: 시뮬 영역만 새로 결정, 그 외는 보존
    const newOv=scheduleToLineOverride(scenario.result.schedule,dts);
    const mergedOv={};
    Object.entries(lineOverride).forEach(([k,v])=>{
      const d=k.length>=10?k.slice(-10):'';
      if(!dts.includes(d))mergedOv[k]=v;
    });
    Object.entries(newOv).forEach(([k,v])=>{mergedOv[k]=v});
    setLineOverride(mergedOv);LS('lineOverride',mergedOv);
    setApsModal(null);
    const m=scenario.metrics;
    alert(`'${scenario.name}' 적용 완료\n· 교체 ${m.changeoverCount}회 (${m.changeoverMin}분)\n· 총 생산 ${m.totalProduced}개\n· 납기준수 ${(m.onTimeRate*100).toFixed(0)}%${m.totalShort>0?` (남은 부족 ${m.totalShort}개)`:''}`);
  };

  const applyCapWarn=()=>{
    if(!capWarn)return;
    setMp(capWarn.plan);setCapWarn(null);
    const totalProd=Object.values(capWarn.plan).reduce((a,obj)=>a+Object.values(obj).reduce((s,v)=>s+v,0),0);

function Inv({inv,setInv,setTxns,addTxn,sd,codes,groups,liveInv}){
  const downloadInventoryTemplate=()=>{
    const wb=XLSX.utils.book_new();
    const data=[['반제품코드','반제품명','현재고']];
    codes.forEach(c=>data.push([c,sd[c].n,'']));
    const ws=XLSX.utils.aoa_to_sheet(data);
    ws['!cols']=[{wch:20},{wch:38},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws,'초기재고');
    XLSX.writeFile(wb,'스프링_초기재고_양식.xlsx');
  };
  const[gf,setGf]=useState('전체');
  const[editVals,setEditVals]=useState({});   // 행별 편집 중인 값 (blur 시 commit)
  const fl=gf==='전체'?codes:codes.filter(c=>sd[c].g===gf);
  const handleExcelUpload=()=>{
    const i=document.createElement('input');i.type='file';i.accept='.xls,.xlsx';
    i.onchange=e=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();r.onload=ev=>{
        try{
          const wb=XLSX.read(ev.target.result,{type:'array'});
          const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});
          const ni={...inv};let cnt=0;
          for(let ri=1;ri<rows.length;ri++){
            const rw=rows[ri];
            for(let ci=0;ci<rw.length;ci++){
              const cell=String(rw[ci]||'');
              if(cell.match(/^[A-Z]{4}\d{6}-R000$/)){
                const code=cell;
                if(sd[code]){
                  let lastVal=null;
                  for(let cj=ci+1;cj<rw.length;cj++){
                    const val=parseInt(rw[cj]);
                    if(!isNaN(val)&&val>=0)lastVal=val;
                  }
                  if(lastVal!==null){ni[code]=lastVal;cnt++}
                }
                break;
              }
            }
          }
          const applyReset=()=>{
            if(!confirm(cnt+'종의 초기 재고를 새 값으로 재세팅합니다.\n누적된 거래 내역도 같이 초기화됩니다.\n\n진행하시겠습니까?'))return false;
            setInv(ni);LS('baseInv',ni);
            setTxns([]);LS('txns',[]);
            alert(cnt+'종의 초기 재고가 반영되고, 거래 내역이 초기화되었습니다.');
            return true;
          };
          if(cnt>0){applyReset()}
          else{
            for(let ri=4;ri<rows.length;ri++){
              const rw=rows[ri];if(!rw||!rw[2])continue;
              const name=String(rw[2]).trim();
              const lastCol=rw[rw.length-1];const val=parseInt(lastCol);
              if(isNaN(val))continue;
              const match=codes.find(c=>sd[c].n===name);
              if(match){ni[match]=val;cnt++}
            }
            if(cnt>0){applyReset()}
            else{
              // 더 친절한 진단: 매핑 미등록 vs 코드 미일치 vs 형식 문제 구분
              if(Object.keys(sd).length===0){
                alert('인식 실패: 매핑이 등록되지 않았습니다.\n\n[매핑 관리] 탭에서 매핑 양식을 먼저 업로드한 뒤,\n초기 재고 양식을 업로드해 주세요.');
              }else{
                let unmatched=0;const unmatchedSample=[];
                for(let ri2=1;ri2<rows.length;ri2++){
                  const rw2=rows[ri2]||[];
                  for(let ci2=0;ci2<rw2.length;ci2++){
                    const cell2=String(rw2[ci2]||'');
                    if(cell2.match(/^[A-Z]{4}\d{6}-R000$/)){
                      if(!sd[cell2]){unmatched++;if(unmatchedSample.length<3)unmatchedSample.push(cell2);}
                      break;
                    }
                  }
                }
                if(unmatched>0)alert(`인식 실패: 양식의 ${unmatched}개 코드가 현재 매핑에 등록되지 않았습니다.\n[매핑 관리] 탭에서 매핑을 다시 확인해 주세요.\n\n예시: ${unmatchedSample.join(', ')}`);
                else alert('반제품코드 또는 반제품명을 인식할 수 없습니다.\n양식 형식(반제품코드 | 반제품명 | 현재고)을 확인해 주세요.');
              }
            }
          }
        }catch(er){alert('파일 읽기 오류: '+er.message)}
      };r.readAsArrayBuffer(f);
    };i.click();
  };
  return(<div>
    <div className="flex items-center justify-between mb-4">
      <div><h2 className="text-sm font-medium">초기 재고 / 현재고 조정</h2><p className="text-xs text-gray-500 mt-0.5">월말 재실사는 [엑셀에서 불러오기], 평소 ±조정은 아래 표 직접 수정 (수정 시 자동 저장)</p></div>
      <div className="flex gap-2">
        <button onClick={downloadInventoryTemplate} className="px-3 py-2 text-xs font-medium text-gray-500 bg-gray-100 rounded-lg hover:bg-gray-200">↓ 양식 다운로드</button>
        <button onClick={handleExcelUpload} className="px-3 py-2 text-xs font-medium text-blue-600 bg-blue-50 rounded-lg hover:bg-blue-100 border border-blue-200">엑셀에서 불러오기</button>
      </div>
    </div>
    <div className="mb-3"><select value={gf} onChange={e=>setGf(e.target.value)} className="text-xs px-3 py-1.5 border border-gray-200 rounded-lg bg-[#FFFFFF] focus:outline-none focus:ring-2 focus:ring-blue-200 cursor-pointer"><option value="전체">전체 그룹 (37종)</option>{groups.map(g=><option key={g} value={g}>{g} ({codes.filter(c=>sd[c].g===g).length}종)</option>)}</select></div>
    <div className="border border-gray-200 rounded-lg overflow-auto" style={{maxHeight:500}}>
      <table className="w-full text-xs"><thead className="sticky top-0"><tr className="bg-gray-50 border-b border-gray-200">
        <th className="text-left px-3 py-2 font-medium text-gray-500">반제품코드</th>
        <th className="text-left px-3 py-2 font-medium text-gray-500">반제품명</th>
        <th className="text-left px-2 py-2 font-medium text-gray-500 w-20">그룹</th>
        <th className="text-right px-3 py-2 font-medium text-gray-500 w-24">현재고</th>
      </tr></thead><tbody>{fl.map(c=>
        <tr key={c} className="border-b border-gray-100 hover:bg-gray-50">
          <td className="px-3 py-1.5 text-gray-500 font-mono text-xs">{c}</td>
          <td className="px-3 py-1.5 font-medium">{sd[c].n}</td>
          <td className="px-2 py-1.5"><Tag g={sd[c].g}/></td>
          <td className="px-3 py-1.5 text-right">
            <input type="number" min="0"
              value={editVals[c]!==undefined?editVals[c]:(liveInv[c]||'')}
              placeholder="0"
              onChange={e=>setEditVals(p=>({...p,[c]:e.target.value}))}
              onBlur={()=>{
                const raw=editVals[c];
                if(raw===undefined)return;
                const trimmed=String(raw).trim();
                const clearEdit=()=>setEditVals(p=>{const np={...p};delete np[c];return np});
                if(trimmed===''){clearEdit();return}
                const newVal=parseInt(trimmed);
                if(isNaN(newVal)||newVal<0){clearEdit();return}
                const oldVal=liveInv[c]||0;
                const delta=newVal-oldVal;
                if(delta!==0)addTxn('adj_'+c+'_'+Date.now(),{[c]:delta});
                clearEdit();
              }}
              onKeyDown={e=>{
                if(e.key==='Enter')e.target.blur();
                else if(e.key==='Escape'){
                  setEditVals(p=>{const np={...p};delete np[c];return np});
                  e.target.blur();
                }
              }}
              className="w-20 text-right px-2 py-1 border border-blue-200 rounded bg-blue-50 text-blue-700 font-medium focus:outline-none focus:ring-2 focus:ring-blue-300 text-xs"/>
          </td>
        </tr>
      )}</tbody></table>
    </div>
  </div>);
}

function MapMgr({map,setMap,onUp,sd,hist}){
  const[sr,setSr]=useState('');

    <div className="flex items-center justify-between mb-4">
      <div><h2 className="text-sm font-medium">제품 → 스프링 매핑</h2><p className="text-xs text-gray-500 mt-0.5">등록: {Object.keys(map).length}건</p></div>
      <div className="flex gap-2">
        <button onClick={downloadMappingTemplate} className="px-3 py-1.5 text-xs font-medium text-gray-500 bg-gray-100 rounded-lg hover:bg-gray-200">↓ 매핑 양식 다운로드</button>
        <button onClick={()=>{const i=document.createElement('input');i.type='file';i.accept='.xls,.xlsx';i.onchange=e=>onUp(e.target.files[0]);i.click()}} className="px-3 py-1.5 text-xs font-medium text-blue-600 bg-blue-50 rounded-lg hover:bg-blue-100">매핑 엑셀 업로드</button>

    </div>

    <div className="border border-gray-200 rounded-lg overflow-auto" style={{maxHeight:400}}>
      <table className="w-full text-xs"><thead className="sticky top-0"><tr className="bg-gray-50 border-b border-gray-200">
        <th className="text-left px-3 py-2 font-medium text-gray-500">제품코드</th>
        <th className="text-left px-3 py-2 font-medium text-gray-500">제품명</th>
        <th className="text-left px-3 py-2 font-medium text-gray-500">스프링코드</th>
        <th className="text-left px-3 py-2 font-medium text-gray-500">스프링명</th><th className="text-left px-3 py-2 font-medium text-gray-500">그룹</th>
      </tr></thead><tbody>{ent.length===0?<tr><td colSpan={4} className="text-center py-6 text-gray-400">매핑 엑셀을 업로드하세요</td></tr>:
        ent.slice(0,50).map(([c,info])=><tr key={c} className="border-b border-gray-100 hover:bg-gray-50">
          <td className="px-3 py-1.5 font-mono text-gray-600">{c}</td>
          <td className="px-3 py-1.5">{info.name||'-'}</td>
          <td className="px-3 py-1.5 font-mono text-blue-600">{info.sc||'-'}</td>
          <td className="px-3 py-1.5 text-gray-700">{info.sc&&sd[info.sc]?sd[info.sc].n:(info.sn||'-')}</td><td className="px-3 py-1.5"><Tag g={info.sg||'기타'}/></td>
        </tr>)
      }</tbody></table>
    </div>
    {(()=>{
      // 모든 업로드 이력에서 미매핑 제품코드 수집 (중복 제거, 최신순)
      const allUm=[...new Set((hist||[]).flatMap(h=>h.unmapped||[]))];
      if(allUm.length===0)return null;
      // 이미 매핑된 코드는 제외
      const stillUm=allUm.filter(c=>!map[c]);
      if(stillUm.length===0)return null;
      return <div className="mt-4 border border-amber-200 rounded-lg p-4 bg-amber-50">
        <div className="flex items-center justify-between mb-2">
          <div className="text-xs font-medium text-amber-700">⚠ 미매핑 제품코드 ({stillUm.length}건) — 매핑 엑셀에 추가 후 재업로드하세요</div>
        </div>
        <div className="flex flex-wrap gap-1">{stillUm.map((c,i)=><span key={i} className="px-2 py-0.5 bg-white border border-amber-200 rounded text-xs text-amber-800 font-mono">{c}</span>)}</div>
      </div>;
    })()}
  </div>);
}

function GroupSpecMgr({groupSpec,setGroupSpec}){
  const update=(g,field,value)=>{
    const v=value===''?null:value;
    const next={...groupSpec,[g]:{...(groupSpec[g]||{}),[field]:v}};
    setGroupSpec(next);LS('groupSpec',next);
  };
  const missing=getMissingSpecGroups(groupSpec);
  return(<div>
    <div className="bg-white rounded-lg border border-gray-200 p-4 mb-4">
      <div className="flex items-baseline gap-3 mb-2">
        <h3 className="text-sm font-medium">그룹 스펙</h3>
        <span className="text-xs text-gray-400">교체시간 계산용 강선 / 높이 / 부직포 (변경 시 자동 저장)</span>
      </div>
      <p className="text-xs text-gray-500 leading-relaxed">두 그룹의 강선·높이·부직포 값이 모두 같으면 교체시간 0분, 다르면 변경 항목 수에 따라 30~120분이 산출됩니다.<br/>같은 값을 가진 그룹은 자동 계획에서 연속 생산되어 교체가 발생하지 않습니다.</p>
      {missing.length>0&&<div className="mt-3 px-3 py-2 bg-amber-50 border border-amber-200 rounded text-xs text-amber-700">
        ⚠ 미입력 {missing.length}개 그룹: {missing.map(m=>`${m.group}(${m.fields.join('·')})`).join(', ')}

    </div>
    <div className="bg-white rounded-lg border border-gray-200 overflow-hidden">
      <table className="w-full text-xs">
        <thead><tr className="bg-gray-50 border-b border-gray-200">
          <th className="text-left px-3 py-2 font-medium text-gray-500 w-32">그룹</th>
          {['wire','height','fabric'].map(f=><th key={f} className="text-left px-3 py-2 font-medium text-gray-500">{SPEC_LABEL[f]}</th>)}
        </tr></thead>
        <tbody>
          {GROUP_LIST.map(g=>{
            const s=groupSpec[g]||{};
            const cell=(field)=>{
              const empty=s[field]==null||s[field]==='';
              return <select value={s[field]==null?'':s[field]} onChange={e=>update(g,field,e.target.value)}
                className={`w-full px-2 py-1 border rounded text-xs cursor-pointer ${empty?'border-amber-300 bg-amber-50 text-amber-700':'border-gray-200 bg-white'} focus:outline-none focus:ring-2 focus:ring-blue-200`}>
                <option value="">- 선택 -</option>
                {SPEC_OPTIONS[field].map(opt=><option key={opt} value={opt}>{opt}</option>)}
              </select>;
            };
            return(<tr key={g} className="border-b border-gray-100 last:border-0">
              <td className="px-3 py-2"><Tag g={g}/></td>
              <td className="px-2 py-2">{cell('wire')}</td>
              <td className="px-2 py-2">{cell('height')}</td>
              <td className="px-2 py-2">{cell('fabric')}</td>
            </tr>);
          })}
        </tbody>
      </table>
    </div>
  </div>);
}

function App(){
  const[user,setUser]=useState(null);
  const[tab,setTab]=useState('dashboard');
  const[baseInv,setBaseInv]=useState(()=>LS('baseInv')||LS('inv')||{});
  const[txns,setTxns]=useState(()=>LS('txns')||[]);
  const[map,setMap]=useState(()=>LS('map')||{});
  const[hist,setHist]=useState(()=>LS('hist')||[]);
  const[plan,setPlan]=useState(()=>LS('plan')||{});
  const[mp,setMp]=useState(()=>LS('mp')||{});
  const[capacity,setCapacity]=useState(()=>normalizeCapacity(LS('capacity')));
  const[toast,setToast]=useState(null);
  const[logs,setLogs]=useState(()=>LS('logs')||[]);
  const[fbLoaded,setFbLoaded]=useState(false);
  const[completedCards,setCompletedCards]=useState(()=>LS('completedCards')||{});
  const[carryLog,setCarryLog]=useState(()=>LS('carryLog')||[]);
  const[safetyDays,setSafetyDays]=useState(()=>LS('safetyDays')||7);
  const[productOutbound,setProductOutbound]=useState(()=>LS('productOutbound')||{});
  const[groupSpec,setGroupSpec]=useState(()=>LS('groupSpec')||GROUP_SPEC_DEFAULT);
  const[coilerMin,setCoilerMin]=useState(()=>{const v=LS('coilerMin');return v==null?60:v});
  const[mpHistory,setMpHistory]=useState(()=>LS('mpHistory')||[]);
  const[holidays,setHolidays]=useState(()=>LS('holidays')||[]); // [{date:'YYYY-MM-DD', memo:''}]
  // 모바일 감지 (max-width: 767px). 모바일이면 admin이라도 viewer 동일 UI로 강제 — 편집은 PC에서만
  const[isMobile,setIsMobile]=useState(()=>typeof window!=='undefined'&&window.matchMedia&&window.matchMedia('(max-width:767px)').matches);
  useEffect(()=>{
    if(typeof window==='undefined'||!window.matchMedia)return;
    const mq=window.matchMedia('(max-width:767px)');
    const h=e=>setIsMobile(e.matches);
    if(mq.addEventListener)mq.addEventListener('change',h);
    else mq.addListener(h);
    return()=>{if(mq.removeEventListener)mq.removeEventListener('change',h);else mq.removeListener(h)};
  },[]);
  // 스냅샷 저장: 큰 액션 직전에 mp/lineOverride 상태를 보관 (최대 20개)
  const pushMpSnapshot=(label,type)=>{
    const snap={
      ts:new Date().toISOString(),
      label:label||'스냅샷',
      type:type||'generic',
      mp:JSON.parse(JSON.stringify(LS('mp')||{})),
      lineOverride:JSON.parse(JSON.stringify(LS('lineOverride')||{})),
    };
    setMpHistory(prev=>{
      const next=[snap,...(prev||[])].slice(0,20);
      LS('mpHistory',next);
      return next;
    });
  };
  const toggleComplete=(code,date,eq,qty)=>{const k=`${code}_${date}_${eq}`;const n={...completedCards};if(n[k])delete n[k];else n[k]={qty:qty||0};setCompletedCards(n);LS('completedCards',n);};

  // Firebase 초기 동기화
  useEffect(()=>{
    const KEYS=['baseInv','txns','map','hist','plan','mp','capacity','completedCards'];
    const doSync=async()=>{
      await syncFromFirebase();
      setBaseInv(LS('baseInv')||LS('inv')||{});
      setTxns(LS('txns')||[]);
      setMap(LS('map')||{});
      setHist(LS('hist')||[]);
      setPlan(LS('plan')||{});
      setMp(LS('mp')||{});
      setCapacity(normalizeCapacity(LS('capacity')));
      setCompletedCards(LS('completedCards')||{});
      setCarryLog(LS('carryLog')||[]);
      setSafetyDays(LS('safetyDays')||7);
      setProductOutbound(LS('productOutbound')||{});
      setGroupSpec(LS('groupSpec')||GROUP_SPEC_DEFAULT);
      {const v=LS('coilerMin');setCoilerMin(v==null?60:v)}
      setMpHistory(LS('mpHistory')||[]);
      setHolidays(LS('holidays')||[]);
      setFbLoaded(true);
      // 실시간 리스너
      if(window.__fb){
        window.__fb.listen(data=>{
          ['baseInv','txns','map','hist','plan','mp','capacity','completedCards','carryLog','visitors','safetyDays','productOutbound','groupSpec','coilerMin','mpHistory','holidays'].forEach(k=>{
            if(data[k]!==undefined){
              try{localStorage.setItem('si_'+k,typeof data[k]==='string'?data[k]:JSON.stringify(data[k]))}catch{}
            }
          });
          setBaseInv(LS('baseInv')||{});
          setTxns(LS('txns')||[]);
          setMap(LS('map')||{});
          setHist(LS('hist')||[]);
          setPlan(LS('plan')||{});
          setMp(LS('mp')||{});
          setCapacity(normalizeCapacity(LS('capacity')));
          setCompletedCards(LS('completedCards')||{});
          setCarryLog(LS('carryLog')||[]);
          setSafetyDays(LS('safetyDays')||7);
          setProductOutbound(LS('productOutbound')||{});
          setGroupSpec(LS('groupSpec')||GROUP_SPEC_DEFAULT);
          {const v=LS('coilerMin');setCoilerMin(v==null?60:v)}
          setMpHistory(LS('mpHistory')||[]);
          setHolidays(LS('holidays')||[]);
        });
      }
    };
    if(window.__fbReady){doSync();}
    else{document.addEventListener('fbReady',doSync,{once:true});setTimeout(()=>{if(!fbLoaded)setFbLoaded(true)},3000);}
  },[]);

  const {sd,codes,groups}=useMemo(()=>buildCodes(buildSD(map)),[map]);

  // 스프링 월평균 소비량 (= 그 스프링을 쓰는 모든 제품의 월평균 출고량 합)
  const springMonthlyAvg=useMemo(()=>{
    const result={};
    Object.entries(map).forEach(([productCode,v])=>{
      if(!v||!v.sc)return;
      const monthly=productOutbound[productCode]||0;
      if(monthly>0)result[v.sc]=(result[v.sc]||0)+monthly;
    });
    return result;
  },[map,productOutbound]);

  const inv=useMemo(()=>{
    const result={...baseInv};
    txns.forEach(tx=>{
      if(tx.items){Object.entries(tx.items).forEach(([code,qty])=>{result[code]=(result[code]||0)+qty})}
    });
    return result;
  },[baseInv,txns]);

  const show=(m,t='ok')=>{
    setToast({m,t});
    setTimeout(()=>setToast(null),5000);
    const now=new Date();
    const ts=`${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    const newLogs=[{ts,m,t},...logs].slice(0,100);
    setLogs(newLogs);LS('logs',newLogs);
  };

  const addTxn=(txId,items)=>{const nt=[...txns,{id:txId,items}];setTxns(nt);LS('txns',nt)};
  const removeTxn=(txId)=>{const nt=txns.filter(t=>t.id!==txId);setTxns(nt);LS('txns',nt)};

  const handleMapUp=file=>{
    const r=new FileReader();r.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array'});
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});
        const nm={};
        // 헤더 행 수 자동 감지: rows[1]에 실제 코드가 있으면 1행 헤더, 아니면 2행 헤더
        const startRow=rows[1]&&rows[1][0]&&String(rows[1][0]).match(/^[A-Z0-9]/)?1:2;
        for(let i=startRow;i<rows.length;i++){const rw=rows[i];if(rw[0]&&rw[3])nm[rw[0]]={name:rw[2]||'',sc:rw[3],clr:rw[1]||'',sn:rw[5]||'',sg:rw[6]||'기타'}}
        setMap(nm);LS('map',nm);
        show(`매핑 ${Object.keys(nm).length}건 등록 완료`);
      }catch{show('매핑 파일 오류','err')}
    };r.readAsArrayBuffer(file);
  };

  const handleUp=file=>{
    const r=new FileReader();r.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array'});
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,raw:false,dateNF:'yyyy-mm-dd'});
        if(rows.length<2){show('데이터 없음','err');return}
        const hd=rows[0].map(x=>String(x||''));
        const ft=detectFile(hd,rows[0]);
        if(!ft){show('파일 유형을 인식할 수 없습니다','err');return}
        const now=new Date();
        const ds=`${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        const txId='tx_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
        const nh={d:ds,f:file.name,t:ft,s:'ok',txId};
        if(hist.find(h=>h.f===file.name&&h.s==='ok')){nh.s='dup';const h2=[...hist,nh];setHist(h2);LS('hist',h2);show('이미 등록된 파일: '+file.name,'warn');return}

        if(ft==='pkg'){
          if(Object.keys(map).length===0){show('매핑이 등록되지 않았습니다. 매핑 관리에서 먼저 업로드하세요.','err');return}
          const hi={date:hd.indexOf('생산일'),code:hd.indexOf('제품코드'),qty:hd.indexOf('생산량'),line:hd.indexOf('생산라인')};
          const planIdx=hd.indexOf('입고계획차수');
          const items={};let cnt=0,um=[],skip=0;
          for(let i=1;i<rows.length;i++){
            const rw=rows[i];if(!rw[hi.code]||String(rw[hi.code]).includes('Total')||String(rw[hi.code]).includes('Sub'))continue;
            if(planIdx>=0){const pv=String(rw[planIdx]||'');if(pv.includes('재포장')||pv.includes('조정')){skip++;continue}}
            const ln=String(rw[hi.line]||'');if(ln&&!ln.includes('포장1')&&!ln.includes('포장2')&&!ln.includes('모션'))continue;
            const pc=String(rw[hi.code]),qt=parseInt(rw[hi.qty])||0;if(qt<=0)continue;
            const mi=map[pc];if(!mi||!mi.sc){um.push(pc);continue}
            items[mi.sc]=(items[mi.sc]||0)-qt;cnt++;
          }
          addTxn(txId,items);
          let msg=`포장 실적 ${cnt}건 반영 (재고 차감)`;
          if(skip>0)msg+=`, 재포장/조정 ${skip}건 제외`;
          if(um.length>0){nh.unmapped=[...new Set(um)];msg+=`, 매핑 누락 ${nh.unmapped.length}건`;}
          show(msg,um.length>0?'warn':'ok');
        }else if(ft==='proc'){
          const hi={code:hd.indexOf('제품코드'),qty:hd.indexOf('생산량')};
          const items={};let cnt=0;
          for(let i=1;i<rows.length;i++){
            const rw=rows[i];if(!rw[hi.code]||String(rows[i][2]||'').includes('Total'))continue;
            const sc=String(rw[hi.code]),qt=parseInt(rw[hi.qty])||0;
            if(qt<=0)continue;
            items[sc]=(items[sc]||0)+qt;cnt++;
          }
          addTxn(txId,items);
          show(`가공 실적 ${cnt}건 반영 (재고 가산)`);
        }else if(ft==='weekplan'){
          const ws2=wb.Sheets[wb.SheetNames[0]];
          const rawRows=XLSX.utils.sheet_to_json(ws2,{header:1,raw:true});
          const rawH=rawRows[0]||[];
          const codeIdx=hd.indexOf('제품코드');
          const dateCols=[];
          for(let ci=0;ci<rawH.length;ci++){
            const dt=excelDateToISO(rawH[ci]);
            if(dt)dateCols.push({ci,date:dt});
          }
          if(dateCols.length===0){show('주간계획에서 날짜 컬럼을 인식할 수 없습니다.','err');return}
          const np={};let cnt=0,um=[];
          for(let i=1;i<rows.length;i++){
            const rw=rows[i];
            if(!rw[codeIdx])continue;
            const rowLabel=String(rw[0]||'')+String(rw[1]||'');
            if(rowLabel.includes('Total')||rowLabel.includes('Sub'))continue;
            const code=String(rw[codeIdx]);
            const mi=map[code];
            let springCode=null;
            if(mi&&mi.sc)springCode=mi.sc;
            if(!springCode){
              const hasQty=dateCols.some(dc=>(parseInt(rw[dc.ci])||0)>0);
              if(hasQty)um.push(code);
              continue;
            }
            for(const dc of dateCols){
              const qty=parseInt(rw[dc.ci])||0;
              if(qty>0){
                if(!np[springCode])np[springCode]=[];
                np[springCode].push({date:dc.date,qty});
                cnt++;
              }
            }
          }
          const merged={...plan};
          Object.entries(np).forEach(([code,items])=>{
            if(!merged[code])merged[code]=[];
            items.forEach(ni=>{
              const dup=merged[code].find(e=>e.date===ni.date&&e.qty===ni.qty);
              if(!dup)merged[code].push(ni);
            });
          });
          setPlan(merged);LS('plan',merged);
          nh.planData=np;
          const dateRange=dateCols.length>0?`${dateCols[0].date} ~ ${dateCols[dateCols.length-1].date}`:'';
          if(um.length>0){nh.unmapped=[...new Set(um)];show(`주간계획 병합 (${dateRange}): ${cnt}건, 매핑 누락 ${nh.unmapped.length}건`,'warn');}
          else if(cnt>0)show(`주간계획 병합 (${dateRange}): 출고예정 ${cnt}건 추가`);
          else show('주간계획에서 매핑된 출고예정이 없습니다.','warn');
        } else if(ft==='pkgplan'){
          // 포장계획일지 파싱
          // 규칙1: 계획차수에 '재포장'/'조정' 포함 시 제외
          // 규칙2: 확정여부가 '강제마감'이면 계획량-생산량 남아도 제외
          // 규칙3: 계획차수 빈칸 → 위 행의 계획차수 상속
          // 규칙4: 포장1(스프링), 포장2(모션) 라인만 처리
          if(Object.keys(map).length===0){show('매핑이 등록되지 않았습니다.','err');return}
          // 날짜 파싱을 위해 raw:true로 재파싱
          const rawWb=XLSX.read(e.target.result,{type:'array',cellDates:true});
          const rawRows=XLSX.utils.sheet_to_json(rawWb.Sheets[rawWb.SheetNames[0]],{header:1,raw:true});
          const ci={
            code:hd.indexOf('품목코드'),
            color:hd.indexOf('색상'),
            date:hd.indexOf('포장계획일'),
            plan:hd.indexOf('계획량'),
            prod:hd.indexOf('생산량'),
            planno:hd.indexOf('계획차수'),
            confirm:hd.findIndex(h=>String(h||'').includes('확정여부'))
          };
          if(ci.code<0||ci.date<0||ci.plan<0){show('포장계획 파일 컬럼을 인식할 수 없습니다.','err');return}
          const safeStr=(rw,idx)=>idx>=0&&idx<rw.length&&rw[idx]!=null?String(rw[idx]):'';
          const np={};let cnt=0,um=[];
          let lastPlanno='';
          for(let i=1;i<rawRows.length;i++){
            const rw=rawRows[i];
            if(!rw[ci.code])continue;
            // 계획차수 빈칸 상속
            const rawPlanno=safeStr(rw,ci.planno).trim();
            if(rawPlanno)lastPlanno=rawPlanno;
            const planno=lastPlanno||'';
            // 규칙1: 재포장/조정 제외
            if(planno.includes('재포장')||planno.includes('조정'))continue;
            // 규칙2: 강제마감 제외
            if(safeStr(rw,ci.confirm).includes('강제마감'))continue;
            const code=safeStr(rw,ci.code).trim();
            // 날짜 파싱 (Excel 시리얼 or Date 객체 or 문자열)
            const date=excelDateToISO(rw[ci.date]);
            if(!date)continue;
            const planQty=parseInt(rw[ci.plan])||0;
            const prodQty=parseInt(rw[ci.prod])||0;
            const remQty=planQty-prodQty;
            if(remQty<=0)continue;
            const color=safeStr(rw,ci.color).trim();
            const mi=map[code+'_'+color]||map[code];
            if(!mi||!mi.sc){um.push(code);continue}
            const sc=mi.sc;
            if(!np[sc])np[sc]=[];
            const dup=np[sc].find(e=>e.date===date);
            if(dup)dup.qty+=remQty; else np[sc].push({date,qty:remQty});
            cnt++;
          }
          // pkgplan: 전체 출고예정 교체 + 이전 pkgplan active 해제
          setPlan(np);LS('plan',np);
          nh.planData=np;
          nh.active=true;
          if(um.length>0)nh.unmapped=[...new Set(um)];
          const msg=`포장계획 반영: ${cnt}건 (기존 출고예정 교체)${um.length>0?`, 매핑 누락 ${nh.unmapped.length}건`:''}`;
          show(msg,um.length>0?'warn':'ok');
        } else if(ft==='erp'){
          // ERP 자재소요현황: 제품 월평균 출고량 추출 (헤더 텍스트로 동적 검색)
          if(Object.keys(map).length===0){show('매핑이 등록되지 않았습니다. 매핑 관리에서 먼저 업로드하세요.','err');return}
          const codeIdx=hd.findIndex(x=>String(x||'').includes('품목코드'));
          const avgIdx=hd.findIndex(x=>String(x||'').includes('3개월'));
          if(codeIdx<0||avgIdx<0){show('ERP 파일 헤더 인식 실패 (품목코드 또는 3개월 평균매출)','err');return}
          // 멀티헤더 처리: row 1 첫 셀이 코드 형태면 데이터 시작이 row 1, 아니면 row 2
          const probe=rows[1]&&rows[1][codeIdx]!=null?String(rows[1][codeIdx]).trim():'';
          const startRow=/^[A-Za-z0-9]/.test(probe)?1:2;
          const newOutbound={};
          let cnt=0,um=[],zero=0;
          for(let i=startRow;i<rows.length;i++){
            const rw=rows[i];
            if(!rw||rw[codeIdx]==null)continue;
            const productCode=String(rw[codeIdx]).trim();
            if(!productCode||productCode.includes('Total')||productCode.includes('Sub'))continue;
            const avg3m=parseFloat(rw[avgIdx])||0;
            if(avg3m===0){zero++;continue}
            if(!map[productCode]){um.push(productCode);continue}
            const monthly=avg3m/3;
            newOutbound[productCode]=(newOutbound[productCode]||0)+monthly;
            cnt++;
          }
          setProductOutbound(newOutbound);LS('productOutbound',newOutbound);
          nh.outboundData=newOutbound;
          let msg=`ERP 출고량 ${cnt}건 등록`;
          if(um.length>0){nh.unmapped=[...new Set(um)];msg+=`, 매핑 누락 ${nh.unmapped.length}건`;}
          if(zero>0)msg+=`, 비활성(0) ${zero}건 제외`;
          show(msg,um.length>0?'warn':'ok');
        }
        // pkgplan이면 기존 pkgplan 이력 active 해제
        const updHist=hist.map(h=>h.t==='pkgplan'?{...h,active:false}:h);
        const h2=[...updHist,nh];setHist(h2);LS('hist',h2);
      }catch(er){show('파일 처리 오류: '+(er.message||''),'err')}
    };r.readAsArrayBuffer(file);
  };

      setPlan(np);LS('plan',np);

        </div>}
        {tab==='dashboard'&&<Dash inv={inv} map={map} hist={hist} onUp={handleUp} isA={isA} plan={plan} mp={mp} sd={sd} codes={codes} groups={groups} completedCards={completedCards} carryLog={carryLog}/>}

          </div>
          <div className="mt-6 pt-4 border-t border-gray-200">
            <button onClick={()=>{if(!confirm('⚠ 모든 데이터를 초기화하시겠습니까?\n\n초기 재고, 매핑, 업로드 이력, 출고예정, 가공계획,\n알림 로그가 모두 삭제됩니다.\n\n이 작업은 되돌릴 수 없습니다.'))return;const vis=localStorage.getItem('si_visitors');localStorage.clear();if(vis)localStorage.setItem('si_visitors',vis);location.reload()}} className="text-xs px-4 py-2 text-red-500 border border-red-200 rounded-lg hover:bg-red-50">전체 데이터 초기화 (모든 데이터 삭제)</button>
          </div>
        </div>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
